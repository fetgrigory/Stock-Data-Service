{% extends 'base.html' %}
{% block title %}
Создать отчет
{% endblock %}

{% block body %}

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/css/report.css">
</head>

<body>
    <header>
    </header>
    <section>
        <div class="container">
            <div class="row mt-1 position-fixed z-3">
            </div>
        </div>
        <!-- Content -->
        <div class="container">
            <div class="row mt-1">
                <div class="col-lg-2">
                    <!-- Optional empty block -->
                </div>
                <div class="col-lg-10">
                    <!-- Content on the page -->
                    <div class=" bg-white p-4 mb-4 mx-2 rounded custom-shadow">
                        <div class="container">
                            <!-- Title -->
                            <h3 class="text-center mb-4">Создать отчет</h3>
                            <div class="container" id="cart-items-container">
                            </div>
                        </div>
                        <!-- Report details -->
                        <div class="container">
                            <!-- Title -->
                            <h3 class="text-center">Детали отчета</h3>
                            <div class="card mb-3">
                                <div class="card-body">
                                    <form method="post" action="/download_report">
                                        <div class="row">
                                            <div class="col-md-6 mb-3">
                                                <label for="id_start_date" class="form-label">C*:</label>
                                                <input type="date" class="form-control" id="id_start_date"
                                                    name="start_date" required>
                                            </div>
                                            <div class="col-md-6 mb-3">
                                                <label for="id_end_date" class="form-label">По*:</label>
                                                <input type="date" class="form-control" id="id_end_date" name="end_date" required>
                                            </div>
                                            <div class="col-md-6 mb-3">
                                                <label for="id_file_name" class="form-label">Имя файла:</label>
                                                <input type="text" class="form-control" id="id_file_name" name="file_name"
                                                    placeholder="В формате: report_2023-01-01_2023-01-31"
                                                    required>
                                            </div>
                                            <div class="col-md-12 mb-3">
                                                <label for="delivery" class="form-label">Формат файла: </label>
                                                <div class="form-check form-check-inline">
                                                    <input class="form-check-input" type="radio" name="requires_delivery"
                                                        id="id_requires_delivery" value="1" checked>
                                                    <label class="form-check-label" for="id_requires_delivery">.csv</label>
                                                </div>
                                            </div>
                                        </div>
                                        <button type="submit" class="btn btn-dark">Получить данные</button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
{% endblock %}
