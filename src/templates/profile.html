<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Data Service - Личный кабинет</title>
    <link rel="stylesheet" href="/static/css/profile.css">
</head>
<body>
    <!-- Main Content -->
        <main class="main-content">
            <div class="top-bar">
                <div class="menu-toggle">☰</div>
                <div class="user-avatar-top">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="#e91e63">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                    </svg>
                </div>
            </div>

            <div class="content-wrapper">
                <!-- Profile Card -->
                <div class="profile-card">
                    <div class="avatar-container">
                        <div class="avatar">
                            <svg viewBox="0 0 24 24">
                                <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zm-5-6c0 1.66-1.34 3-3 3s-3-1.34-3-3 1.34-3 3-3 3 1.34 3 3zm-9 8c0-2 4-3.1 6-3.1s6 1.1 6 3.1v1H5v-1z"/>
                            </svg>
                        </div>
                        <div class="camera-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="#666">
                                <path d="M12 15c1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3 1.34 3 3 3z"/>
                                <path d="M20 4h-3.17L15 2H9L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V6h4.05l1.83-2h4.24l1.83 2H20v12z"/>
                            </svg>
                        </div>
                    </div>
                    <div class="profile-name">{{ user.first_name }}<br>{{ user.last_name }}</div>
                    <div class="profile-info-title">Контактная информация</div>
                    <div class="profile-email">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="#666">
                            <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
                        </svg>
                        {{ user.email }}
                    </div>
                </div>

                <!-- Form Section -->
                <div class="form-section">
                    <div class="tabs">
                        <div class="tab active">Контактные данные</div>
                        <div class="tab">Изменение пароля</div>
                    </div>

                    <h2 class="form-title">Контактные данные</h2>

                    <form>
                        <div class="form-group">
                            <label class="form-label">Имя</label>
                            <input type="text" class="form-input" value="Хадишт">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Фамилия</label>
                            <input type="text" class="form-input" value="Манкиева">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-input" value="mankieva63@mail.ru">
                        </div>
                        <button type="submit" class="save-button">Сохранить изменения</button>
                    </form>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
